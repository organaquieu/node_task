# Локальный Postgres для shadow БД при `prisma migrate dev` против облака (Yandex и др.).
# Запуск: docker compose up -d
# Порт 5432 должен быть свободен; пароль совпадает с SHADOW_DATABASE_URL в .env.example

services:
  postgres-shadow:
    image: postgres:16-alpine
    container_name: task-postgres-shadow
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
